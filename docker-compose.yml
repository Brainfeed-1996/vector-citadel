version: '3.9'

services:
  rust-core:
    build:
      context: ./rust-core
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - RUST_LOG=info
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend-dashboard
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    environment:
      - VITE_API_URL=http://rust-core:8080

  python-ingestion:
    build:
      context: ./python-ingestion
      dockerfile: Dockerfile
    depends_on:
      - rust-core
    volumes:
      - ./demo-data:/app/demo-data

volumes:
  demo-data: