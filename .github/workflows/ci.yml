name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - run: cd rust-core && cargo fmt --check
      - run: cd rust-core && cargo clippy -- -D warnings
      - run: cd rust-core && cargo build --release

  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install ruff
      - run: cd python-ingestion && ruff check src/
      - run: cd python-ingestion && ruff format --check src/

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: cd frontend-dashboard && npm ci
      - run: cd frontend-dashboard && npx tsc --noEmit
      - run: cd frontend-dashboard && npm run build